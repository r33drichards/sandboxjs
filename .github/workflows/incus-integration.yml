name: Incus Integration Tests (NixOS)

on:
  pull_request:
    branches: [ "**" ]
    paths:
      - 'src/providers/incus.ts'
      - 'src/examples/incus.ts'
      - 'tests/incus-integration.test.js'
      - 'incus-api.yaml'
      - 'nixos-test.nix'
      - 'flake.nix'
      - '.github/workflows/incus-integration.yml'
  workflow_dispatch:
    inputs:
      skip_integration:
        description: 'Skip integration tests (dry run)'
        type: boolean
        default: false

jobs:
  nixos-incus-integration:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Nix
      uses: cachix/install-nix-action@v27
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
        nix_path: nixpkgs=channel:nixos-unstable

    - name: Enable Nix Flakes
      run: |
        mkdir -p ~/.config/nix
        echo "experimental-features = nix-command flakes" >> ~/.config/nix/nix.conf

    - name: Setup Nix Cache
      uses: cachix/cachix-action@v15
      with:
        name: devenv

    - name: Enable KVM support
      run: |
        # Enable KVM support for NixOS VM testing
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    # - name: Build sandbox package
    #   run: nix build .#default --show-trace
    #   continue-on-error: ${{ github.event.inputs.skip_integration == 'true' }}

    - name: Run NixOS Incus Integration Test
      run: |
        # Run the NixOS test with timeout
        timeout 1800 nix flake check --show-trace -L
      continue-on-error: ${{ github.event.inputs.skip_integration == 'true' }}
      env:
        # Increase verbosity for debugging
        NIX_LOG: debug

